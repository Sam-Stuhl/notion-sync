<div class="flex items-start justify-between mb-5">
    <div>
        <h3 class="ns-display text-lg font-semibold">Add an integration</h3>
        <p class="text-sm text-base-content/40 mt-0.5">Choose a learning platform to connect</p>
    </div>
    <button class="btn btn-ghost btn-sm btn-square -mt-1 -mr-2"
            onclick="document.getElementById('integration-modal').close()">
        <i data-lucide="x" class="w-4 h-4"></i>
    </button>
</div>

<div class="grid grid-cols-2 gap-3">
    {% for service in services %}

    {% if service.status == 'available' %}
    <button class="flex flex-col items-start gap-3 p-4 rounded-lg bg-base-300 border border-base-300
                   hover:border-primary/40 hover:bg-base-300/60 transition-all text-left group"
            hx-get="/integrations/{{ service.id }}/new-form"
            hx-target="#integration-modal-content"
            hx-swap="innerHTML">
        <i data-lucide="{{ service.icon }}" class="w-5 h-5 text-base-content/50 group-hover:text-primary transition-colors"></i>
        <div>
            <p class="text-sm font-medium">{{ service.name }}</p>
            <p class="text-xs text-base-content/40 mt-0.5 leading-relaxed">{{ service.description }}</p>
        </div>
    </button>

    {% else %}
    <div class="flex flex-col items-start gap-3 p-4 rounded-lg bg-base-300 border border-base-300
                opacity-40 cursor-not-allowed select-none">
        <div class="flex items-center justify-between w-full">
            <i data-lucide="{{ service.icon }}" class="w-5 h-5 text-base-content/50"></i>
            <span class="badge badge-ghost badge-xs text-base-content/50">Coming soon</span>
        </div>
        <div>
            <p class="text-sm font-medium">{{ service.name }}</p>
            <p class="text-xs text-base-content/40 mt-0.5 leading-relaxed">{{ service.description }}</p>
        </div>
    </div>
    {% endif %}

    {% endfor %}
</div>
