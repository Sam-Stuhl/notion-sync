name: deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, Windows]
    steps:
      - name: Pull latest and restart
        shell: powershell
        working-directory: C:\srv\notion-sync
        run: |
          git fetch origin
          git reset --hard origin/main
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          Restart-Service notion-sync

      - name: Health check
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $ok = $false
          foreach ($i in 1..10) {
            try {
              $r = Invoke-WebRequest http://127.0.0.1:8000 -UseBasicParsing -TimeoutSec 5
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {
              Write-Host "Attempt $i: not up yet, retrying in 3s..."
              Start-Sleep -Seconds 3
            }
          }
          if (-not $ok) {
            Write-Error "Health check failed: app did not return 200 after restart"
            exit 1
          }
          Write-Host "Health check passed: app is serving 200"
