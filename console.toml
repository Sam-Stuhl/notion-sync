secrets = ["NOTION_OAUTH_CLIENT_ID", "NOTION_OAUTH_CLIENT_SECRET", "DATABASE_URL", "ENCRYPTION_KEY", "JWT_SECRET"]

[app]
name = "notion-sync"
subdomain = "notion-sync"   # serves at notion-sync.samstuhl.com
port = 8000                 # uvicorn already listens here

[health]
path = "/"        # returns 200 unauthenticated; the console probe needs a literal 200
timeout = 60

[resources]
memory = "512m"
cpus = 1.0

[env]
APP_BASE_URL = "https://notion-sync.samstuhl.com"
LOG_LEVEL = "INFO"